# ===== SERVIDOR =====
server.port=8080

# ===== BANCO DE DADOS H2 (embutido) =====
spring.datasource.url=jdbc:h2:mem:raizesnordeste;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JWT =====
jwt.secret=raizesnordeste-secret-key-super-segura-2024-backend-atividade
jwt.expiration=86400000

# ===== SWAGGER / OPENAPI =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===== LOGS =====
logging.level.com.raizesnordeste=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
